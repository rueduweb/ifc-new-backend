services:
  api:
    container_name: nestjs-backpart-dev
    build:
      context: .
      dockerfile: Dockerfile.dev

    ports:
      - "3000:3000"

    volumes:
      - .:/app
      - /app/node_modules

    env_file:
      - .env

    environment:
      NODE_ENV: development

    restart: unless-stopped

    command: npm run start:dev